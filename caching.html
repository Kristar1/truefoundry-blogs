<h2>§0 — TL;DR &amp; The Invoice, the Slowdowns, and the Business Case for Caching</h2>

<div class="scenario">
  <div class="scenario-title">💸 Illustrative Scenario: The Compliance FAQ That Went Cross-Divisional</div>
  <p>A mid-sized financial services firm deployed an AI-powered compliance FAQ assistant in January — one pod, one model endpoint, one team consuming it. By mid-March, three separate business units had quietly integrated the same gateway endpoint into their internal tooling: regulatory affairs, risk management, and client onboarding. The model was <code>gpt-4o</code>. The use-case was ideal for caching: answering questions about KYC documentation requirements, internal policy thresholds, and reporting deadlines.</p>
  <p>When Finance reviewed the monthly cloud cost allocation, the OpenAI invoice had reached <strong>$38,400 for a single month</strong>. A quick log analysis told the story immediately. The top 30 question clusters accounted for 71% of all API calls. Queries such as <em>"What documents are required for corporate KYC?"</em>, <em>"What is the threshold for SAR filing?"</em>, and <em>"How many business days for settlement reporting?"</em> were being answered fresh — hundreds of times per day across different users who phrased them with minor natural-language variation. Not one exact duplicate. But the same question, hundreds of times over.</p>
  <p>The fix was not adding an exact string cache — nobody typed the same sentence twice. The fix was <strong>semantic caching at the gateway layer</strong>: intercepting each prompt before it reached the model, computing a dense vector embedding, and checking whether a sufficiently similar question had already been answered. On this domain-bounded workload, a properly tuned semantic cache would have served 60–70% of those calls from cache at under 20ms, reducing the monthly invoice to under $14,000.</p>
</div>

<h2>§1 — Why Semantic Caching Belongs in the Gateway, Not the Application</h2>
<p>Exact-match caching — keying on a verbatim hash of the prompt string — captures perhaps 5–15% of real-world traffic duplication on conversational workloads. Natural language is inherently paraphrastic: the same intent surfaces across an enormous surface of phrasing variants. <em>"What docs do I need for KYC?"</em>, <em>"KYC documentation requirements?"</em>, and <em>"List the corporate KYC documents"</em> are three strings that map to one answer. Exact-match caching treats them as three cache misses.</p>
<p>Semantic caching solves this by embedding incoming prompts into a dense vector space and performing a nearest-neighbour search against previously cached prompt–response pairs. When the cosine similarity (or equivalent distance metric) between the incoming prompt and a cached prompt exceeds a configurable threshold, the cached response is returned directly — the upstream model is never called.</p>
<p>The AI gateway is the architecturally correct layer for this for three reasons:</p>
<ul>
<li><strong>Centralized interception.</strong> All application requests flow through one path. No per-application caching code to build, test, or audit.</li>
<li><strong>Model-agnostic cost control.</strong> A cache hit means the upstream LLM endpoint is never called regardless of whether the model is <code>gpt-4o</code>, <code>claude-3-7-sonnet</code>, or <code>gemini-2.5-pro</code> — and never billed.</li>
<li><strong>Uniform policy enforcement.</strong> TTL, similarity threshold, per-tenant namespace isolation, and data-residency controls are enforced centrally rather than hoping individual application teams implement them correctly.</li>
</ul>

<!-- ══════ §2 LITELLM ══════ -->
<div class="vendor-header litellm">
<span class="vendor-badge">LiteLLM</span>
<span class="vendor-title">§2 — Redis Stack + Qdrant: Maximum Backend Flexibility</span>

<h3>Architecture</h3>
<p>LiteLLM's proxy implements semantic caching natively as part of its <code>litellm_settings.cache_params</code> block in <code>config.yaml</code>. Setting <code>type</code> to <code>"redis-semantic"</code> or <code>"qdrant-semantic"</code> activates the vector pipeline. The public <a href="https://docs.litellm.ai/docs/proxy/caching" target="_blank">caching docs</a> document both backends fully. On each inbound request, the proxy first checks for an exact-match hit (fast, hash-based), then falls through to a semantic similarity check, and only forwards to the upstream LLM on a full miss — writing the response and its embedding back to the store afterwards.</p>
<p>LiteLLM's complete cache type inventory, per the <a href="https://docs.litellm.ai/docs/proxy/caching" target="_blank">official caching page</a>:</p>
<ul>
<li><code>in-memory</code> — process-local, exact match only; cleared on proxy restart.</li>
<li><code>disk</code> — file-backed, exact match only.</li>
<li><code>redis</code> — vanilla Redis, exact string match; good for high-throughput exact deduplication.</li>
<li><code>redis-semantic</code> — requires <strong>Redis Stack</strong> (not vanilla Redis) with the RediSearch module for HNSW vector indexing.</li>
<li><code>qdrant-semantic</code> — connects to a Qdrant instance (self-hosted or cloud). Preferred for richer vector management, metadata filtering, or multi-collection tenancy.</li>
<li><code>s3</code> / <code>gcs</code> — object-store backed, exact match only.</li>
</ul>
<div class="callout warn">
<div class="callout-title">Redis Stack ≠ Redis</div>
<p><code>redis-semantic</code> requires the <code>redis/redis-stack</code> Docker image (or an equivalent Redis deployment with the RediSearch module enabled). Vanilla Redis will not work as a vector backend. If your team runs standard Redis for other workloads, you need a separate Redis Stack instance or a managed Redis with vector search support.</p>
</div>

litellm_settings:
  cache: true
  cache_params:

<h3>Per-Request Cache Control</h3>
<p>LiteLLM exposes fine-grained per-request cache overrides via the <code>cache</code> key in <code>extra_body</code>. Both cache lookup and cache write behavior can be adjusted per request.</p>
<div class="code-wrap"><pre>from openai import OpenAI

client = OpenAI(
    base_url="http://litellm-proxy:4000/v1",
    api_key="sk-litellm-master-key",
)

# Read from cache if possible, but do not write the new response back
client.chat.completions.create(
    model="gpt-4o",
    messages=[{"role": "user", "content": "What are KYC documentation requirements?"}],
    extra_body={"cache": {"no-store": True}},
)

# Force a live model call, then write the fresh response back to cache
client.chat.completions.create(
    model="gpt-4o",
    messages=[{"role": "user", "content": "What are KYC documentation requirements?"}],
    extra_body={"cache": {"no-cache": True, "no-store": False}},
)

# Use a custom cache namespace for tenant isolation
client.chat.completions.create(
    model="gpt-4o",
    messages=[{"role": "user", "content": "What are KYC documentation requirements?"}],
    extra_body={"cache": {"namespace": "team-compliance"}},
)</pre><button class="copy-btn">copy</button></div>
<div class="source-note">Source: <a href="https://docs.litellm.ai/docs/proxy/caching" target="_blank">docs.litellm.ai/docs/proxy/caching</a> — per-request cache controls</div>

<div class="vendor-header kong">
<span class="vendor-badge">Kong</span>
<span class="vendor-title">§3 — ai-semantic-cache: Plugin-Native Semantic Cache</span>

<h3>Architecture</h3>
<p>Kong AI Gateway implements semantic caching as a dedicated plugin: <code>ai-semantic-cache</code>, available in Kong Gateway ≥ 3.8 under the Enterprise license. As documented on the <a href="https://developer.konghq.com/plugins/ai-semantic-cache/" target="_blank">plugin page</a> and its <a href="https://developer.konghq.com/plugins/ai-semantic-cache/examples/openai/" target="_blank">OpenAI + Redis example</a>, the plugin stores user requests in a vector database based on semantic meaning and retrieves relevant cached requests when a similar query is made.</p>
<p>The plugin integrates natively into Kong's plugin execution chain — the same chain that handles authentication, rate limiting, and prompt guards. Semantic caching can therefore be scoped with surgical precision: per-route, per-service, or per-consumer, without any application changes. The embedding model is called from the Kong Gateway node to a configured external provider, and the resulting vector is stored in and queried against a supported vector backend such as Redis with vector search or PostgreSQL with <code>pgvector</code>.</p>
<p>The <a href="https://developer.konghq.com/ai-gateway/semantic-similarity/" target="_blank">semantic similarity reference</a> documents the shared substrate that also powers Kong's semantic routing, RAG injection, and semantic prompt guards — all using the same embedding-plus-vector-DB pattern.</p>
<div class="callout warn">
<div class="callout-title">Supported Backends: Redis or pgvector — Not Qdrant</div>
<p>Current Kong docs for <code>ai-semantic-cache</code> describe Redis-based and <code>pgvector</code>-based vector backends. Qdrant is still not documented as a supported backend for this plugin, so teams standardised on Qdrant would need an alternative approach.</p>
</div>
<div class="callout warn">
<div class="callout-title">Threshold Semantics: Distance, Not Similarity</div>
<p>Kong's <code>threshold</code> parameter in <code>ai-semantic-cache</code> is a <strong>distance</strong> value, not a cosine similarity score. A <em>lower</em> value means stricter matching. The example below uses <code>threshold: 0.1</code>, which corresponds roughly to cosine similarity ≥ 0.90. The <code>dimensions</code> field must match the exact output dimensionality of the configured embedding model: <code>1536</code> for <code>text-embedding-3-small</code>, <code>3072</code> for <code>text-embedding-3-large</code>.</p>
</div>
<h3>Declarative Configuration (decK)</h3>
<div class="code-wrap"><pre>_format_version: "3.0"

plugins:
- name: ai-semantic-cache
  config:
    embeddings:
      auth:
        header_name: Authorization
        header_value: Bearer ${{ env "DECK_OPENAI_API_KEY" }}
      model:
        provider: openai
        name: text-embedding-3-large
        options:
          upstream_url: https://api.openai.com/v1/embeddings
    vectordb:
      dimensions: 3072
      distance_metric: cosine
      strategy: redis
      threshold: 0.1
      redis:
        host: ${{ env "DECK_REDIS_HOST" }}
        port: 6379
    cache_ttl: 300</pre><button class="copy-btn">copy</button></div>

<span class="vendor-title">§4 — Semantic Cache: Managed SaaS Path, Hybrid Enterprise Options</span>

<h3>Architecture</h3>
<p>Portkey's semantic cache is activated through the <code>cache</code> key in a Portkey Config object, with <code>mode: "semantic"</code>. In the managed SaaS path documented on the <a href="https://portkey.ai/docs/product/ai-gateway/cache-simple-and-semantic" target="_blank">Cache (Simple &amp; Semantic)</a> page, customers do not provision a vector database directly: the embedding, indexing, and lookup workflow is managed by Portkey.</p>
<p>Current Portkey enterprise docs also describe hybrid and self-hosted deployments where the data plane, cache store, and semantic cache store can run inside customer infrastructure. In other words, the product supports both a managed SaaS experience and more controlled enterprise deployment postures; it is inaccurate to describe Portkey as SaaS-only.</p>
<p>Key behaviours documented on the Portkey caching page:</p>
<ul>
<li><strong>Two modes:</strong> <code>simple</code> (exact string match, broadly available) and <code>semantic</code> (vector similarity, documented as available only on select Enterprise plans).</li>
<li><strong>Documented constraints:</strong> Semantic cache currently applies only to <code>/chat/completions</code> and <code>/completions</code>, and only within the documented message-count and token-size limits.</li>
<li><strong>System prompt ignored:</strong> For semantic cache matching, the first message (typically the system prompt) is intentionally ignored during matching.</li>
<li><strong>Namespace isolation:</strong> The <code>cache_namespace</code> per-request option partitions the cache by custom key.</li>
<li><strong>Refresh control:</strong> The SDK docs expose <code>cache_force_refresh=True</code> for fetching a fresh response and refreshing the cache entry.</li>
<li><strong>Observability:</strong> Analytics expose hit rate, latency savings, and cost savings; logs expose states such as <em>Cache Hit</em>, <em>Cache Semantic Hit</em>, <em>Cache Miss</em>, and <em>Cache Refreshed</em>.</li>
</ul>
<h3>Config Object - Semantic Cache</h3>
<div class="code-wrap"><pre>{
  "cache": {
    "mode": "semantic",
    "max_age": 60
  },
  "strategy": {
    "mode": "fallback"
  },
  "targets": [
    {
      "override_params": {
        "model": "@openai-prod/gpt-4o"
      }
    },
    {
      "override_params": {
        "model": "@anthropic-prod/claude-3-5-sonnet-20241022"
      }
    }

}</pre><button class="copy-btn">copy</button></div>

<!-- ══════ §5 TRUEFOUNDRY ══════ -->
<div class="vendor-header tf">
<span class="vendor-badge">TrueFoundry</span>
<span class="vendor-title">§5 — Request-Level Exact and Semantic Cache Controls</span>
</div>
<h3>Architecture</h3>
<p>TrueFoundry's public caching docs describe request caching as an AI Gateway feature controlled per request through the <code>x-tfy-cache-config</code> header. The gateway currently documents two cache strategies: <code>exact-match</code> for identical requests and <code>semantic</code> for meaning-based reuse with embeddings and cosine-similarity scoring.</p>
<p>The cache page is strongest on runtime semantics and request controls. The separate <a href="https://www.truefoundry.com/docs/platform/gateway-plane-architecture" target="_blank">gateway plane architecture</a> page explains that the gateway plane can run on customer infrastructure and is designed as a low-latency Hono-based proxy with in-memory checks plus asynchronous logs and metrics.</p>
<h3>Simple Caching (Exact-Match)</h3>
<p>TrueFoundry's exact-match mode is the simple cache. The docs say the gateway hashes the complete request — messages, model, and parameters — and returns a cached response only when that hash matches exactly. This is the right mode for deterministic flows, repeated internal tooling calls, and development or test traffic where you expect identical inputs to produce identical outputs.</p>
<h3>Semantic Caching</h3>
<p>TrueFoundry's semantic cache uses embeddings and cosine similarity to match requests that mean the same thing even when phrased differently. The current docs add two useful implementation details: semantic mode is a superset that also covers exact-match hits, and the gateway embeds only the last message while hashing the rest of the request parameters exactly. That means the semantic comparison is intentionally narrow and should be understood as <em>semantic matching on the newest user turn, exact matching on the rest of the request envelope</em>.</p>
<p>The docs also publish practical operating limits: start with a <code>similarity_threshold</code> of <code>0.9</code>, tune based on hit rate versus accuracy, and note that semantic cache currently works only when the input is within the documented embedding-model token limits.</p>
<h3>Cache Backend Configuration</h3>
<p>This is the place where the public docs are intentionally narrower than some competitors. TrueFoundry currently documents <strong>embedding-model configuration</strong>, not a public vector-database selector. On on-prem deployments, the embedding model is configurable through <em>Controls &gt; Settings &gt; Semantic Cache</em>. In the SaaS deployment, the docs say TrueFoundry uses OpenAI <code>text-embedding-3-small</code> by default and does not expose that choice as customer-configurable. The public cache docs do <strong>not</strong> currently name the underlying vector-store or cache-store engine, so this review avoids claiming Redis, Qdrant, pgvector, or any other backend for TrueFoundry without a separate source.</p>
<h3>What the Current Public Docs Explicitly Document</h3>
<ul>
<li><strong>Request-level cache policy.</strong> <code>x-tfy-cache-config</code> supports <code>type</code>, <code>ttl</code>, <code>namespace</code>, and (for semantic cache) <code>similarity_threshold</code>.</li>
<li><strong>Simple cache semantics.</strong> Exact-match mode hashes the complete request and only returns a hit when the full request matches.</li>
<li><strong>Semantic cache semantics.</strong> The last message is embedded; the rest of the request parameters must still match exactly.</li>
<li><strong>Threshold guidance.</strong> The docs recommend starting at <code>0.9</code> and adjusting based on hit rate and answer quality.</li>
<li><strong>Deployment-type-specific embedding configuration.</strong> On-prem embedding model selection is configurable; SaaS defaults to OpenAI <code>text-embedding-3-small</code>.</li>
<li><strong>Cache observability headers.</strong> Responses can include <code>x-tfy-cache-status</code>, <code>x-tfy-cached-trace-id</code>, and <code>x-tfy-cache-similarity-score</code>.</li>
</ul>
<h3>Exact-Match Cache via Request Header</h3>
<div class="code-wrap"><pre>curl https://{controlPlaneURL}/api/llm/chat/completions \
  -H "Content-Type: application/json" \
  -H "Authorization: Bearer your-truefoundry-api-key" \
  -H "x-tfy-cache-config: {\"type\": \"exact-match\", \"ttl\": 600, \"namespace\": \"production-app\"}" \
  -d '{
    "model": "openai-main/gpt-4o",
    "messages": [
      {
        "role": "user",
        "content": "What is the capital of France?"
      }
    ]
  }' </pre><button class="copy-btn">copy</button></div>
<div class="source-note">Source: <a href="https://www.truefoundry.com/docs/ai-gateway/caching" target="_blank">TrueFoundry Docs — Caching (Exact and Semantic)</a></div>

<h2>§6 — Data Privacy Boundaries for Cached Payloads</h2>
<p>Semantic caching introduces a new data artifact that compliance teams often overlook: <strong>the prompt embedding vector</strong>. Even when embeddings are much smaller than the original text, they still preserve semantic information about the request. For regulated workloads, they should usually be reviewed as sensitive derived data rather than as harmless metadata.</p>
<p>Different applications within the same organisation may need radically different privacy postures for their cached payloads. A public knowledge-base FAQ assistant and an internal HR benefits chatbot should never share a cache namespace — and ideally, the sensitive application's embeddings should never reach an external service at all.</p>

<h3>How Each Platform Implements Privacy Boundaries</h3>
<div class="privacy-grid">
<div class="priv-card">
<div class="priv-label" style="color:var(--litellm)">LiteLLM</div>
<div class="priv-name">Manual Namespace Planning</div>
<div class="priv-desc">LiteLLM documents Redis namespaces for exact-match cache and exposes per-request <code>no-cache</code> / <code>no-store</code> controls. Teams using semantic cache still need to plan collection or backend isolation deliberately when running multi-tenant workloads.</div>
</div>
<div class="priv-card">
<div class="priv-label" style="color:var(--kong)">Kong AI GW</div>
<div class="priv-name">Plugin Scoping + Backend Isolation</div>
<div class="priv-desc">The <code>ai-semantic-cache</code> plugin can be scoped at Route, Service, or Consumer level. Current docs describe Redis-based and pgvector-based backends, and the embedding API call still exits the Kong node to an external provider unless you self-host that embedding endpoint.</div>
</div>
<div class="priv-card">
<div class="priv-label" style="color:var(--portkey)">Portkey</div>
<div class="priv-name">cache_namespace Parameter</div>
<div class="priv-desc">The <code>cache_namespace</code> per-request option partitions the cache store by custom key. Residency depends on deployment mode: SaaS keeps the managed path in Portkey infrastructure, while current enterprise docs also describe hybrid/self-hosted options with customer-hosted data-plane components.</div>
</div>
<div class="priv-card">
<div class="priv-label" style="color:var(--tf)">TrueFoundry</div>
<div class="priv-name">Request Namespace + Deployment Controls</div>
<div class="priv-desc">Current public docs expose cache namespaces directly in <code>x-tfy-cache-config</code> and describe self-hosted/on-prem gateway deployment plus deployment-type-specific embedding-model behaviour. The docs do not publicly spell out the underlying cache-store implementation, so privacy conclusions should stay at the documented deployment-model level.</div>
</div>

<h2>§8 — Editorial Verdict</h2>
<p>Editorial assessments based on public documentation reviewed on March 25, 2026.</p>
<div class="verdict-grid">
<div class="verdict-card litellm">
<div class="verdict-label">LiteLLM</div>
<div class="verdict-name">The Configurable Open-Source Cache</div>
<div class="verdict-text">Strongest backend flexibility: choose Redis Stack or Qdrant without changing application code. MIT-licensed core means zero caching-specific licensing cost. The per-request cache controls are unusually granular. The trade-off is operational ownership: you still deploy and operate the proxy plus the cache backend yourself.</div>
<div class="verdict-use"><strong>Ideal for:</strong> Platform teams that want full control over backend choice, data residency, and cache policy, and are comfortable owning the infrastructure.</div>
</div>
<div class="verdict-card kong">
<div class="verdict-label">Kong AI Gateway</div>
<div class="verdict-name">The Plugin-Chain Integrator</div>
<div class="verdict-text">The best fit when you are already in the Kong ecosystem and want semantic caching to sit alongside auth, rate limiting, guardrails, and RAG in one plugin chain. Current docs now make the backend story stronger than older drafts: Redis-based and <code>pgvector</code>-based options are documented. The trade-off is enterprise licensing and a more infrastructure-centric operating model.</div>
<div class="verdict-use"><strong>Ideal for:</strong> Existing Kong users who want semantic caching as one more governed traffic control in the broader gateway stack.</div>
</div>
<div class="verdict-card portkey">
<div class="verdict-label">Portkey</div>
<div class="verdict-name">The Managed-First Cache</div>
<div class="verdict-text">Portkey is strongest when you want a managed-first experience and strong analytics. But the public docs are more nuanced than a simple “zero-ops semantic cache” story: simple cache is broadly available, while semantic cache is documented as an enterprise capability that requires a vector database and comes with route and payload constraints.</div>
<div class="verdict-use"><strong>Ideal for:</strong> Teams that value fast adoption and observability, and that are willing to evaluate Portkey's exact deployment mode and commercial tier before standardising on semantic cache.</div>
</div>
<div class="verdict-card tf">
<div class="verdict-label">TrueFoundry</div>
<div class="verdict-name">The Explicit Request-Level Cache</div>
<div class="verdict-text">TrueFoundry's public docs are especially clear on runtime behavior: exact-match caching, semantic caching, threshold guidance, namespace isolation, response headers, and deployment-type-specific embedding-model configuration are all published. The gap is that the public docs do not name the underlying cache/vector store, so backend claims should stop where the docs stop.</div>
<div class="verdict-use"><strong>Ideal for:</strong> Teams already standardising on TrueFoundry AI Gateway who want documented request-level cache controls and a self-hosted gateway-plane story without over-claiming undocumented backend details.</div>
</div>
</div>

<script>
(function () {
  function flashCopied(btn) {
    btn.textContent = 'OK copied';
    btn.classList.add('copied');
    window.setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.setAttribute('readonly', '');
    ta.style.position = 'fixed'; ta.style.top = '-9999px'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    var ok = false; try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta); return ok;
  }
  async function copyText(text) {
    if (window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText) {
      try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
    }
    return fallbackCopy(text);
  }
  document.querySelectorAll('pre').forEach(function(pre) {
    var wrap = pre.parentElement && pre.parentElement.classList.contains('code-wrap') ? pre.parentElement : null;
    if (!wrap) { wrap = document.createElement('div'); wrap.className = 'code-wrap'; pre.parentNode.insertBefore(wrap, pre); wrap.appendChild(pre); }
    var btn = wrap.querySelector('.copy-btn');
    if (!btn) { btn = document.createElement('button'); btn.className = 'copy-btn'; btn.textContent = 'copy'; wrap.appendChild(btn); }
    if (btn.dataset.copyBound === '1') return;
    btn.dataset.copyBound = '1'; btn.type = 'button';
    btn.addEventListener('click', async function() {
      var text = pre.innerText; var ok = await copyText(text);
      if (ok) { flashCopied(btn); } else { btn.textContent = 'copy failed'; window.setTimeout(function(){ btn.textContent = 'copy'; }, 1800); }
    });
  });
})();
</script>
